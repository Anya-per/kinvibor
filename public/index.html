<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>КиноВыбор</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<button id="back-to-top" class="back-to-top">
  <i class="fas fa-arrow-up"></i>
</button>
<body>
  <div class="container">
    <header class="header">
      <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 20px;">
        <!-- ЛЕВАЯ ЧАСТЬ: О проекте -->
        <button onclick="location.href='/about'" class="auth-btn-big" style="background:#ff8a00; min-width:140px;">
          О проекте
        </button>

        <!-- ЦЕНТР: Логотип -->
        <h1>КиноВыбор</h1>

        <!-- ПРАВАЯ ЧАСТЬ: Только избранные и профиль после входа, только "Войти" до входа -->
        
<div style="display:flex; gap:15px; align-items:center;">
  <button id="favoritesBtn" class="auth-btn-big" style="display:none; background:#e91e63;">
    Мои избранные (<span id="favCount">0</span>)
  </button>

  <button id="profileBtn" onclick="location.href='/profile'" 
          class="auth-btn-big" 
          style="background:#4CAF50; display:none;">
    <i class="fas fa-user"></i> Профиль
  </button>
  
  <!-- КНОПКА ВЫХОДА -->
  <button id="logoutBtn" class="auth-btn-big" 
          style="background:#ff4444; display:none; padding:12px 16px;">
    <i class="fas fa-sign-out-alt"></i>
  </button>

  <!-- Только кнопка "Войти" -->
  <div id="authSection">
    <button id="openAuthBtn" class="auth-btn-big">Войти</button>
  </div>
</div>
      </div>
    </header>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="Введите название фильма...">
      <select id="genreSelect"><option value="all">Все жанры</option></select>
      <div class="slider-container">
        <label>Год: <span id="yearValue">Любой</span></label>
        <input type="range" id="yearSlider" min="1950" max="2025" value="2025">
      </div>
      <div class="slider-container">
        <label>Рейтинг от: <span id="ratingValue">0</span></label>
        <input type="range" id="ratingSlider" min="0" max="10" step="0.5" value="0">
      </div>
      <button onclick="applyFilters()" class="main-btn-big">Найти фильмы</button>
    </div>

    <div id="results" class="results"></div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО -->
  <div id="authModal" class="modal-overlay">
    <div class="modal-box">
      <button class="close-btn">×</button>
      <div class="logo"><h2>КиноВыбор</h2></div>
      <h3 id="modalTitle">Добро пожаловать!</h3>
      <p id="modalSubtitle">Войдите в свой аккаунт</p>
      <div class="auth-form">
        <input type="email" id="email" placeholder="Email адрес" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button id="authSubmit" class="submit-btn"><span id="submitText">Войти</span></button>
        <div class="switch-text">
          <span id="switchMessage">Нет аккаунта?</span>
          <span id="toggleAuth" class="link">Зарегистрироваться</span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <!-- ПОДВАЛ САЙТА -->
<footer class="footer">
  <div class="footer-container">
    <div class="footer-section">
      <h3>КиноВыбор</h3>
      <p>Ваш персональный гид в мире кино</p>
    </div>
    <div class="footer-section">
      <h4>Разделы</h4>
      <ul>
        <li><a href="/">Главная</a></li>
        <li><a href="/about">О проекте</a></li>
        <li><a href="/favorites">Избранное</a></li>
        <li><a href="/profile">Профиль</a></li>
      </ul>
    </div>
    <div class="footer-section">
      <h4>Контакты</h4>
      <p><i class="fas fa-envelope"></i> info@киновыбор.ru</p>
      <p><i class="fab fa-telegram"></i> @киновыбор</p>
    </div>
    <div class="footer-section">
      <h4>© 2026 КиноВыбор</h4>
      <p>Все права защищены</p>
    </div>
  </div>
</footer>
</body>
</html>
