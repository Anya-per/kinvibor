<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>КиноВыбор — Мой профиль</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
    }
    .profile-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .profile-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      margin: 0 auto 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .profile-name {
      font-size: 32px;
      margin: 0 0 10px;
      color: #333;
      text-align: center;
    }
    .profile-email {
      font-size: 18px;
      color: #666;
      margin-bottom: 5px;
      text-align: center;
    }
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 40px 0;
    }
    .stat-card {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .stat-number {
      font-size: 36px;
      font-weight: bold;
      color: #ff3b30;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 16px;
      color: #666;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 16px;
      color: #333;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
    }
    .profile-actions {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    .logout-btn {
      background: #e91e63;
    }
    .delete-btn {
      background: #f44336;
    }
    .favorite-movie {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .favorite-movie:hover {
      background: #e9ecef;
      transform: translateY(-2px);
    }
    .favorite-movie img {
      width: 60px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
    }
    .remove-favorite {
      margin-left: auto;
      background: #ff5252;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .remove-favorite:hover {
      background: #ff1744;
    }
    
    @media (max-width: 768px) {
      .profile-stats {
        grid-template-columns: 1fr;
      }
      .profile-card {
        padding: 25px;
      }
      .profile-avatar {
        width: 100px;
        height: 100px;
        font-size: 40px;
      }
      .profile-name {
        font-size: 28px;
      }
      .profile-actions {
        flex-direction: column;
      }
      .profile-actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <button onclick="location.href='/'" class="main-btn-big" style="background:#ff8a00;">
        ← На главную
      </button>
      <h1 style="font-size:36px; background:linear-gradient(90deg,#ff3b30,#ff8a00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        Мой профиль
      </h1>
      <button onclick="location.href='/favorites'" class="auth-btn-big" style="background:#e91e63;">
        Мои избранные
      </button>
    </div>

    <div class="profile-card">
      <div class="profile-avatar"><i class="fas fa-user"></i></div>
      <div style="text-align:center; margin-bottom:30px;">
        <h2 id="userName" class="profile-name">Загрузка...</h2>
        <p id="userEmail" class="profile-email">Загрузка...</p>
        <p id="memberSince" class="profile-email">Дата регистрации: загрузка...</p>
      </div>

      <div class="profile-stats">
        <div class="stat-card">
          <div id="favoritesCount" class="stat-number">0</div>
          <div class="stat-label">Избранные</div>
        </div>
        <div class="stat-card">
          <div id="daysMember" class="stat-number">0</div>
          <div class="stat-label">Дней с нами</div>
        </div>
        <div class="stat-card">
          <div id="lastLogin" class="stat-number">—</div>
          <div class="stat-label">Последний вход</div>
        </div>
      </div>

      <div style="margin-top:30px;">
        <h3 style="font-size:24px; margin-bottom:20px; color:#333;">Редактировать профиль</h3>
        <div class="form-group">
          <label><i class="fas fa-user"></i> Имя (отображаемое)</label>
          <input type="text" id="editName" placeholder="Введите ваше имя">
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="editEmail" placeholder="Введите email">
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Новый пароль (оставьте пустым, если не меняете)</label>
          <input type="password" id="editPassword" placeholder="Введите новый пароль">
        </div>
        
        <div class="profile-actions">
          <button onclick="saveProfile()" class="main-btn-big" style="background:#1a73e8;">
            <i class="fas fa-save"></i> Сохранить изменения
          </button>
          <button onclick="logout()" class="auth-btn-big logout-btn">
            <i class="fas fa-sign-out-alt"></i> Выйти из аккаунта
          </button>
          <button onclick="deleteAccount()" class="auth-btn-big delete-btn">
            <i class="fas fa-trash"></i> Удалить аккаунт
          </button>
        </div>
      </div>

      <div id="favoritesSection" style="display:none; margin-top:30px;">
        <h3 style="font-size:24px; margin:30px 0 20px; color:#333;">Мои избранные фильмы</h3>
        <div id="favoritesList"></div>
      </div>
    </div>
  </div>

  <script>
    // Делаем функцию глобально доступной
window.removeFromFavorites = async function(movieId, button) {
  // Показываем модальное окно
  const confirmModal = document.createElement('div');
  confirmModal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    backdrop-filter: blur(5px);
  `;
  
  confirmModal.innerHTML = `
    <div style="
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    ">
      <i class="fas fa-trash" style="font-size: 60px; color: #e91e63; margin-bottom: 20px;"></i>
      <h2 style="color: #333; margin-bottom: 15px;">Удалить из избранного</h2>
      <p style="color: #666; margin-bottom: 30px; line-height: 1.5;">
        Удалить этот фильм из избранного?
      </p>
      <div style="display: flex; gap: 15px; justify-content: center;">
        <button id="cancelRemoveProfileBtn" style="
                  padding: 14px 30px;
                  background: #f0f0f0;
                  color: #333;
                  border: none;
                  border-radius: 12px;
                  font-size: 16px;
                  cursor: pointer;
                  font-weight: bold;
                ">
          Отмена
        </button>
        <button id="confirmRemoveProfileBtn" data-movieid="${movieId}" style="
                  padding: 14px 30px;
                  background: #e91e63;
                  color: white;
                  border: none;
                  border-radius: 12px;
                  font-size: 16px;
                  cursor: pointer;
                  font-weight: bold;
                ">
          Удалить
        </button>
      </div>
    </div>
  `;
  
  document.body.appendChild(confirmModal);
  
  // Обработчик отмены
  document.getElementById('cancelRemoveProfileBtn').addEventListener('click', function() {
    confirmModal.remove();
  });
  
  // Обработчик подтверждения
  document.getElementById('confirmRemoveProfileBtn').addEventListener('click', async function() {
    const movieId = parseInt(this.getAttribute('data-movieid'));
    confirmModal.remove();
    
    const token = localStorage.getItem('token');
    if (!token) {
      location.href = '/';
      return;
    }
    
    try {
      const response = await fetch('/api/favorites', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ movieId })
      });

      if (!response.ok) {
        throw new Error('Ошибка при удалении из избранного');
      }

      // Получаем обновленный список избранных
      favorites = await response.json();
      
      // Анимация удаления карточки фильма
      const movieCard = button.closest('.favorite-movie');
      if (movieCard) {
        movieCard.style.transition = 'all 0.3s';
        movieCard.style.opacity = '0';
        movieCard.style.transform = 'translateX(-100px)';
        
        // Удаляем карточку после анимации
        setTimeout(() => {
          movieCard.remove();
          
          // Обновляем счетчик избранных
          document.getElementById('favoritesCount').textContent = favorites.length;
          
          // Если больше нет избранных, скрываем секцию
          const favoritesList = document.getElementById('favoritesList');
          if (favorites.length === 0) {
            document.getElementById('favoritesSection').style.display = 'none';
            
            // Показываем сообщение, что список пуст
            favoritesList.innerHTML = `
              <div style="text-align: center; padding: 40px; color: #666;">
                <i class="fas fa-heart-broken" style="font-size: 48px; margin-bottom: 20px;"></i>
                <p>Нет избранных фильмов</p>
              </div>
            `;
          }
          
          // Обновляем счетчик в шапке профиля
          const pageFavCount = document.getElementById('pageFavCount');
          if (pageFavCount) {
            pageFavCount.textContent = favorites.length;
          }
          
          // Обновляем счетчик в шапке главной (если открыта)
          const mainFavCount = document.getElementById('favCount');
          if (mainFavCount) {
            mainFavCount.textContent = favorites.length;
          }
          
        }, 300);
      }
      
    } catch (error) {
      console.error('Ошибка удаления из избранного:', error);
    }
  });
};
    let userData = {};
    let favorites = [];

    async function loadProfile() {
  const token = localStorage.getItem('token');
  
  if (!token) {
    alert('Для просмотра профиля необходимо войти в аккаунт!');
    location.href = '/';
    return;
  }

  try {
    // Показываем загрузку
    document.getElementById('userName').textContent = 'Загрузка...';
    document.getElementById('userEmail').textContent = 'Загрузка...';
    
    const response = await fetch('/api/profile', {
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });

    const data = await response.json();

    if (!response.ok || !data.success) {
      if (response.status === 401) {
        localStorage.removeItem('token');
        alert('Ваша сессия истекла. Пожалуйста, войдите снова.');
        location.href = '/';
        return;
      }
      throw new Error(data.error || 'Ошибка загрузки профиля');
    }

    // Сохраняем данные
    userData = data.user;
    favorites = data.favorites || [];

    // Обновляем интерфейс
    const displayName = userData.email.split('@')[0];
    document.getElementById('userName').textContent = displayName;
    document.getElementById('userEmail').textContent = userData.email;
    document.getElementById('editName').value = displayName;
    document.getElementById('editEmail').value = userData.email;
    
    // ✅ ПРАВИЛЬНОЕ МЕСТО: здесь, ПОСЛЕ получения data
    if (data.user && data.user.name) {
      localStorage.setItem('userName', data.user.name);
      const profileBtn = document.getElementById('profileBtn');
      if (profileBtn) {
        profileBtn.innerHTML = `<i class="fas fa-user"></i> ${data.user.name}`;
      }
    }
    
    if (userData.created_at_formatted) {
      document.getElementById('memberSince').textContent = `Дата регистрации: ${userData.created_at_formatted}`;
    }
    
    if (data.stats) {
      document.getElementById('favoritesCount').textContent = data.stats.favorites_count;
      document.getElementById('daysMember').textContent = data.stats.days_member;
      document.getElementById('lastLogin').textContent = data.stats.last_login;
    } else {
      document.getElementById('favoritesCount').textContent = favorites.length;
    }
    
    // Загружаем избранные фильмы, если они есть
    if (favorites.length > 0) {
      document.getElementById('favoritesSection').style.display = 'block';
      await loadFavoritesList();
    } else {
      document.getElementById('favoritesSection').style.display = 'none';
    }

  } catch (error) {
    console.error('Ошибка при загрузке профиля:', error);
    
    if (error.message.includes('401') || error.message.includes('токен') || error.message.includes('авторизация')) {
      localStorage.removeItem('token');
      alert('Проблема с авторизацией. Пожалуйста, войдите снова.');
      location.href = '/';
    } else {
      alert('Не удалось загрузить профиль: ' + error.message);
      location.href = '/';
    }
  }
}

    async function loadFavoritesList() {
      const listEl = document.getElementById('favoritesList');
      if (!listEl) return;
      
      listEl.innerHTML = '<p style="color:#666; text-align:center; padding:20px;">Загрузка избранных фильмов...</p>';
      
      try {
        // Загружаем информацию о каждом фильме
        const movieDetails = [];
        
        for (const movieId of favorites) {
          try {
            const response = await fetch(`/api/movie/${movieId}`);
            if (response.ok) {
              const movie = await response.json();
              movieDetails.push(movie);
            }
          } catch (err) {
            console.warn(`Не удалось загрузить фильм ${movieId}:`, err);
          }
        }
        
        if (movieDetails.length === 0) {
          listEl.innerHTML = '<p style="color:#666; text-align:center; padding:20px;">Нет избранных фильмов</p>';
          return;
        }
        
        // Отображаем фильмы
listEl.innerHTML = movieDetails.map(movie => {
  const posterUrl = movie.poster_path 
    ? `/proxy-poster?path=${encodeURIComponent(movie.poster_path)}`
    : 'https://via.placeholder.com/60x90/f5f5f5/666666?text=Нет+постера';
  
  return `
    <div class="favorite-movie" onclick="location.href='/movie/${movie.id}'">
      <img src="${posterUrl}" 
           alt="${movie.title}"
           onerror="this.src='https://via.placeholder.com/60x90/f5f5f5/666666?text=Ошибка'">
      <div style="flex-grow:1;">
        <div style="font-weight:600; color:#333; margin-bottom:5px;">${movie.title}</div>
        <div style="color:#666; font-size:14px;">
          ★ ${movie.vote_average?.toFixed(1) || '—'} 
          • ${movie.release_date?.substring(0,4) || '—'}
        </div>
      </div>
      <button onclick="event.stopPropagation(); removeFromFavorites(${movie.id}, this)" 
              class="remove-favorite" title="Удалить из избранного">
        <i class="fas fa-trash"></i>
      </button>
    </div>
  `;
}).join('');
        
      } catch (error) {
        console.error('Ошибка загрузки избранных:', error);
        listEl.innerHTML = '<p style="color:#f44336; text-align:center; padding:20px;">Ошибка загрузки избранных</p>';
      }
    }

  async function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  const email = document.getElementById('editEmail').value.trim();
  const password = document.getElementById('editPassword').value;
  
  if (!name || !email) {
    return;
  }
  
  const token = localStorage.getItem('token');
  if (!token) {
    location.href = '/';
    return;
  }
  
  try {
    const updateData = { name, email };
    if (password && password.trim() !== '') {
      if (password.length < 6) {
        return;
      }
      updateData.password = password;
    }
    
    const response = await fetch('/api/profile/update', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(updateData)
    });

    const data = await response.json();

    if (!response.ok || !data.success) {
      throw new Error(data.error || 'Ошибка обновления профиля');
    }
    // Обновляем имя на странице профиля
    document.getElementById('userName').textContent = name;
    
    // Сохраняем имя в localStorage
    localStorage.setItem('userName', name);
    
    // Обновляем кнопку профиля в шапке
    const profileBtn = document.getElementById('profileBtn');
    if (profileBtn) {
      profileBtn.innerHTML = `<i class="fas fa-user"></i> ${name}`;
    }
    
    // Очищаем поле пароля
    document.getElementById('editPassword').value = '';
    
    // Показываем уведомление об успехе
    showNotification('Успех', 'Профиль успешно обновлен', 'success');

  } catch (error) {
    console.error('Ошибка сохранения профиля:', error);
    showNotification('Ошибка', 'Не удалось сохранить изменения', 'error');
  }
}

  const confirmModal = document.createElement('div');
  confirmModal.id = 'deleteAccountModal';
  confirmModal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    backdrop-filter: blur(5px);
  `;
  
  confirmModal.innerHTML = `
    <div style="
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    ">
      <i class="fas fa-exclamation-triangle" style="font-size: 70px; color: #f44336; margin-bottom: 25px;"></i>
      <h2 style="color: #333; margin-bottom: 15px; font-size: 28px;">Удаление аккаунта</h2>
      <p style="color: #666; margin-bottom: 10px; line-height: 1.5; font-size: 17px;">
        <strong>ВНИМАНИЕ!</strong> Это действие невозможно отменить.
      </p>
      <p style="color: #666; margin-bottom: 25px; line-height: 1.5; font-size: 16px;">
        Все ваши данные, включая избранные фильмы, будут удалены навсегда.
      </p>
      <div style="display: flex; gap: 15px; justify-content: center; margin-top: 30px;">
        <button id="cancelDeleteBtn" style="
                  padding: 14px 35px;
                  background: #4CAF50;
                  color: white;
                  border: none;
                  border-radius: 12px;
                  font-size: 16px;
                  cursor: pointer;
                  font-weight: bold;
                ">
          Отмена
        </button>
        <button id="confirmDeleteBtn" style="
                  padding: 14px 35px;
                  background: #f44336;
                  color: white;
                  border: none;
                  border-radius: 12px;
                  font-size: 16px;
                  cursor: pointer;
                  font-weight: bold;
                ">
          Удалить аккаунт
        </button>
      </div>
    </div>
  `;
  
  document.body.appendChild(confirmModal);
  
  // Обработчик отмены
  document.getElementById('cancelDeleteBtn').addEventListener('click', function() {
    document.getElementById('deleteAccountModal').remove();
  });
  
  // Обработчик подтверждения
  document.getElementById('confirmDeleteBtn').addEventListener('click', async function() {
    const token = localStorage.getItem('token');
    if (!token) {
      location.href = '/';
      return;
    }
    
    try {
      const response = await fetch('/api/profile/delete', {
        method: 'DELETE',
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        throw new Error(data.error || 'Ошибка удаления аккаунта');
      }

      // Удаляем токен и перенаправляем без сообщений
      localStorage.removeItem('token');
      location.href = '/';
      
    } catch (error) {
      console.error('Ошибка удаления аккаунта:', error);
      document.getElementById('deleteAccountModal').remove();
    }
  });
}
